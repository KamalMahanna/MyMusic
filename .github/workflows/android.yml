name: Android CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Generate Version Info
      id: version
      run: |
        # Format date as YY.MM.DD
        DATE=$(date +'%y.%m.%d')
        # App version name is YY.MM.DD.RUN_NUMBER to make it unique and sequential
        VERSION_NAME="$DATE.${{ github.run_number }}"
        TAG_NAME="v$VERSION_NAME"
        echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
        echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

    - name: Grant Execute Permission to Gradlew
      run: chmod +x gradlew

    - name: Decode Keystore
      run: |
        echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > app/release.keystore

    - name: Build APK
      run: ./gradlew assembleRelease -Dorg.gradle.java.home="$JAVA_HOME"
      env:
        APP_VERSION_NAME: ${{ steps.version.outputs.version_name }}
        APP_VERSION_CODE: ${{ github.run_number }}
        KEYSTORE_PATH: release.keystore
        KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

    - name: Prepare APK for Release
      run: |
        cp app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/MyMusic-${{ steps.version.outputs.version_name }}.apk

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MyMusic-${{ steps.version.outputs.version_name }}
        path: app/build/outputs/apk/release/MyMusic-${{ steps.version.outputs.version_name }}.apk

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.tag_name }}
        name: Release ${{ steps.version.outputs.version_name }}
        body: |
          Automated release generated on push to main branch.
          
          **Version Name:** `${{ steps.version.outputs.version_name }}`
          **Version Code:** `${{ github.run_number }}`
        files: app/build/outputs/apk/release/MyMusic-${{ steps.version.outputs.version_name }}.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
